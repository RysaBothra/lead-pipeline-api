# Netlify config for the Next.js landing page (lives in landing/).
# The Python backend in this repo deploys separately on Render and is ignored
# by Netlify because of the base directory below.
[build]
  base = "landing"
  command = "npm run build"
  publish = "out"

# The landing now bundles firebase@12 / three / webauthn, which need Node >=20.
[build.environment]
  NODE_VERSION = "20"
