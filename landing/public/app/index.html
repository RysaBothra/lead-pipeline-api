<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LeadsIQ — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0b0a1f;
      --card: #12112b;
      --border: rgba(255,255,255,0.08);
      --text: #ffffff;
      --muted: #9ca3af;
      --accent: #7c3aed;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 28px;
      border-bottom: 1px solid var(--border);
    }
    .logo { display: flex; align-items: center; gap: 3px; }
    .logo span { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; }
    .logo img { height: 26px; width: auto; }
    .signout {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      font: inherit;
      font-size: 13px;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .signout:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.18); }
    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card {
      width: 100%;
      max-width: 560px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
    }
    .eyebrow { font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin: 0 0 10px; }
    h1 { font-size: 28px; font-weight: 700; margin: 0 0 8px; line-height: 1.2; }
    .sub { color: var(--muted); font-size: 15px; line-height: 1.6; margin: 0; }
    .domain {
      margin-top: 24px;
      padding: 16px 18px;
      background: rgba(124,58,237,0.08);
      border: 1px solid rgba(124,58,237,0.25);
      border-radius: 12px;
      display: none;
    }
    .domain .lbl { font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
    .domain .val { font-size: 16px; font-weight: 600; margin-top: 4px; word-break: break-all; }
    .meta { margin-top: 24px; font-size: 13px; color: var(--muted); }
  </style>
</head>
<body>
  <!-- Auth gate: runs before the body paints. If there's no valid login
       session, bounce to /login so the dashboard is never shown unauthenticated. -->
  <script>
    (function () {
      try {
        var raw = localStorage.getItem('auth');
        var a = raw ? JSON.parse(raw) : null;
        var ok = a && a.isAuthenticated && a.authToken &&
          (!a.tokenExpiry || a.tokenExpiry > Date.now());
        if (!ok) { location.replace('/login'); }
      } catch (e) {
        location.replace('/login');
      }
    })();
  </script>

  <header>
    <a class="logo" href="/">
      <span>Leads</span>
      <img src="/mark.png" alt="iQ" />
    </a>
    <button class="signout" onclick="signOut()">Sign out</button>
  </header>

  <main>
    <div class="card">
      <p class="eyebrow">Dashboard</p>
      <h1>Welcome back, <span id="who">there</span>.</h1>
      <p class="sub">You're signed in to LeadsIQ. This is your dashboard home.</p>

      <div class="domain" id="domainBox">
        <div class="lbl">Your website</div>
        <div class="val" id="domainVal"></div>
      </div>

      <p class="meta" id="meta"></p>
    </div>
  </main>

  <script>
    function signOut() {
      try {
        localStorage.removeItem('auth');
        localStorage.removeItem('previous_auth');
        sessionStorage.clear();
      } catch (e) {}
      location.replace('/login');
    }

    (function () {
      var a;
      try { a = JSON.parse(localStorage.getItem('auth') || 'null'); } catch (e) { a = null; }
      if (!a) return;
      var u = a.user || {};
      document.getElementById('who').textContent = u.fullname || u.phone || 'there';

      var domain = new URLSearchParams(location.search).get('domain') ||
        localStorage.getItem('leadsiq_domain') || '';
      domain = domain.replace(/^https?:\/\//, '').trim();
      if (domain) {
        try { localStorage.setItem('leadsiq_domain', domain); } catch (e) {}
        document.getElementById('domainVal').textContent = domain;
        document.getElementById('domainBox').style.display = 'block';
      }

      var bits = [];
      if (u.phone) bits.push(u.phone);
      if (u.email) bits.push(u.email);
      document.getElementById('meta').textContent = bits.join(' · ');
    })();
  </script>
</body>
</html>
